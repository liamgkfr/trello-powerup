<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Erledigt melden</title>

  <link
    rel="stylesheet"
    href="https://p.trellocdn.com/power-up.min.css"
  >

  <link
    rel="stylesheet"
    href="./style.css"
  >
</head>

<body>
  <main class="shell">

    <!-- Eingabeformular -->
    <section
      id="step-entry"
      class="panel"
      aria-labelledby="entry-heading"
    >

      <div
        class="header-mark"
        aria-hidden="true"
      >
        ✓
      </div>

      <div class="heading-group">

        <h1 id="entry-heading">
          Aufgabe erledigt melden
        </h1>

        <p class="intro">
          Trage deinen Namen und bei Bedarf eine Bemerkung ein.
          Mit ERLEDIGT wird die Aufgabe abgeschlossen.
        </p>

      </div>

      <form
        id="entry-form"
        novalidate
      >

        <!-- Name -->
        <div class="field-group">

          <label for="name">
            Name
            <span
              class="required"
              aria-hidden="true"
            >
              *
            </span>
          </label>

          <input
            id="name"
            name="name"
            type="text"
            maxlength="100"
            autocomplete="name"
            placeholder="Name oder Kurzzeichen"
            required
            autofocus
            tabindex="1"
          >

          <p
            id="name-error"
            class="error"
            role="alert"
            hidden
          >
            Bitte einen Namen eingeben.
          </p>

        </div>

        <!-- Bemerkung -->
        <div class="field-group">

          <div class="label-row">

            <label for="remark">
              Bemerkung
            </label>

            <span class="optional">
              optional
            </span>

          </div>

          <textarea
            id="remark"
            name="remark"
            rows="8"
            maxlength="2000"
            placeholder="Zusätzliche Hinweise oder Abweichungen"
            tabindex="2"
          ></textarea>

          <div class="counter">
            <span id="remark-count">0</span>/2000
          </div>

        </div>

        <!-- Status- und Fehlermeldungen -->
        <p
          id="save-status"
          class="status"
          role="status"
          aria-live="polite"
        ></p>

        <!-- Aktionen -->
        <div class="actions">

          <!--
            tabindex="-1" entfernt den Abbrechen-Button aus
            der normalen Tab-Reihenfolge.
          -->
          <button
            type="button"
            class="secondary"
            id="cancel-entry"
            tabindex="-1"
          >
            Abbrechen
          </button>

          <button
            type="submit"
            class="primary done-button"
            id="submit-entry"
            tabindex="3"
          >
            <span
              class="button-check"
              aria-hidden="true"
            >
              ✓
            </span>

            ERLEDIGT
          </button>

        </div>

      </form>

    </section>

    <!-- Erfolgsmeldung -->
    <section
      id="step-success"
      class="panel success"
      aria-labelledby="success-heading"
      hidden
    >

      <div
        class="success-mark"
        aria-hidden="true"
      >
        ✓
      </div>

      <h1 id="success-heading">
        Als erledigt gespeichert
      </h1>

      <p>
        Der Kommentar wurde hinzugefügt und die Karte wurde
        als erledigt markiert.
      </p>

      <button
        type="button"
        class="primary done-button full"
        id="close-modal"
      >
        Fenster schließen
      </button>

    </section>

  </main>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./modal.js"></script>
</body>
</html>
