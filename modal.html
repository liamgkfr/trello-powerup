<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eingabe</title>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <section id="step-entry" class="panel" aria-labelledby="entry-heading">
      <h1 id="entry-heading">Eingabe</h1>
      <p class="intro">Name und Bemerkung eintragen. Mit „Eingabe“ werden der Kommentar gespeichert und die Karte als erledigt markiert.</p>

      <form id="entry-form" novalidate>
        <label for="name">Name <span aria-hidden="true">*</span></label>
        <input id="name" name="name" type="text" maxlength="100" autocomplete="name" required>
        <p id="name-error" class="error" role="alert" hidden>Bitte einen Namen eingeben.</p>

        <label for="remark">Bemerkung</label>
        <textarea id="remark" name="remark" rows="7" maxlength="2000" placeholder="Bemerkung eingeben"></textarea>
        <div class="counter"><span id="remark-count">0</span>/2000</div>

        <p id="save-status" class="status" role="status" aria-live="polite"></p>

        <div class="actions">
          <button type="button" class="secondary" id="cancel-entry">Abbrechen</button>
          <button type="submit" class="primary" id="submit-entry">Eingabe</button>
        </div>
      </form>
    </section>

    <section id="step-success" class="panel success" aria-labelledby="success-heading" hidden>
      <div class="success-mark" aria-hidden="true">✓</div>
      <h1 id="success-heading">Eingabe gespeichert</h1>
      <p>Der Kommentar wurde hinzugefügt und die Karte wurde als erledigt markiert.</p>
      <button type="button" class="primary full" id="close-modal">Fenster schließen</button>
    </section>
  </main>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./modal.js"></script>
</body>
</html>
